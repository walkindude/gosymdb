version: 2

project_name: gosymdb

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: gosymdb
    flags: ["-trimpath"]
    ldflags:
      - -s -w
      - -X github.com/walkindude/gosymdb/internal/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - name: gosymdb
    binaries:
      - gosymdb
    repository:
      owner: walkindude
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    directory: Casks
    homepage: "https://github.com/walkindude/gosymdb"
    description: "Go symbol and call-graph database backed by SQLite"
    # Tell brew the download origin is trusted — suppresses the "verified:"
    # prompt on unnotarized binaries.
    url:
      verified: github.com/walkindude/gosymdb
    # Strip macOS Gatekeeper's quarantine flag on install, so users don't
    # have to right-click → Open on first run. The CLI is unsigned
    # (no Apple Developer Program subscription), so this is the accepted
    # workaround; users who want signed binaries can compile from source.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gosymdb"]
          end

nfpms:
  - id: gosymdb
    package_name: gosymdb
    vendor: walkindude
    homepage: "https://github.com/walkindude/gosymdb"
    maintainer: "Stefano Mioli <s@mioli.me>"
    description: "Go symbol and call-graph database backed by SQLite"
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

release:
  prerelease: auto

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

changelog:
  sort: asc
  use: git
  abbrev: 7
  groups:
    - title: "Features"
      regexp: '^feat'
    - title: "Bug Fixes"
      regexp: '^fix'
    - title: "Performance"
      regexp: '^perf'
    - title: "Refactoring"
      regexp: '^refactor'
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^style:"
