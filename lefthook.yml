pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: |
        files=$(git diff --cached --name-only --diff-filter=ACMR -- '*.go' | tr -d '\r')
        if [ -z "$files" ]; then exit 0; fi
        printf '%s\n' "$files" | while IFS= read -r f; do
          [ -z "$f" ] && continue
          gofmt -w "$f"
          git add "$f"
        done
    leak-check:
      glob: "*.{go,md,json,sh,yml,yaml}"
      run: |
        if git diff --cached --name-only --diff-filter=ACMR | xargs grep -lE 'BQL-|beads-net|bqlog|GOSYMDB_WISHLIST|janus|keystone/|walkindude/keystone' 2>/dev/null; then
          echo ""
          echo "LEAK DETECTED: private references in staged files"
          echo "Fix the files above before committing."
          exit 1
        fi
    gomod-tidy:
      glob: "*.go"
      run: |
        go mod tidy
        git diff --exit-code -- go.mod go.sum
